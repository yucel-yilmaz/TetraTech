services:
  devcontainer:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    volumes:
      - .:/workspace:cached
      - user_models:/data/user-models
    command: sleep infinity
    environment:
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      TETRA_MODEL_UPLOAD_DIR: ${TETRA_MODEL_UPLOAD_DIR:-/data/user-models}
