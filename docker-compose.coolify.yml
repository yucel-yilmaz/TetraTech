services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_SIM_BASE_URL: /sim
        VITE_USER_MODEL_BASE_URL: /user-models
    depends_on:
      - api
      - sim
    expose:
      - "80"
    volumes:
      - user_models:/usr/share/nginx/html/user-models

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      TETRA_MODEL_UPLOAD_DIR: ${TETRA_MODEL_UPLOAD_DIR:-/data/user-models}
    volumes:
      - user_models:/data/user-models
    expose:
      - "8010"

  sim:
    build:
      context: .
      dockerfile: docker/sim.Dockerfile
    expose:
      - "5000"

volumes:
  user_models:
